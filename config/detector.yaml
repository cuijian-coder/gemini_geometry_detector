# HSV threshold for yellow ground line detection
# Note: these values are a starting point; tune them with your actual lighting.

# HSV lower bound (H: 0-179, S: 0-255, V: 0-255)
h_min: 20
s_min: 80
v_min: 80

# HSV upper bound
h_max: 40
s_max: 255
v_max: 255

# Morphological operation kernel size (odd number, 0 to disable)
morph_kernel_size: 5

# Minimum contour area in pixels to be considered valid
min_contour_area: 200

# Maximum number of contour points to publish per contour (0 = all, downsample if >0)
max_contour_points: 64

# Image scale for color detection and guide-line estimation (0.5 = 640x400 for 1280x800 input)
image_scale: 0.5

# Compute the 3D guide line only every N frames (1 = every frame)
guide_line_every_n: 1

# Input topics
input_topic: /camera/color/image_raw
point_cloud_topic: /camera/depth_registered/points
camera_info_topic: /camera/color/camera_info
plane_coefficients_topic: /ground_plane_calibrator/ground_plane/coefficients
